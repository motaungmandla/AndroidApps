name: lesotho_mineral_atlas
description: Mineral consulting app by Phala & Motaung
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'  # ✅ FIXED: Matches Flutter 3.24.0's Dart 3.5.0

dependencies:
  flutter:
    sdk: flutter

  # ✅ State Management
  provider: ^6.1.1

  # ✅ Launch URLs
  url_launcher: ^6.2.4

  # ✅ Share functionality
  share_plus: ^7.2.1

  # ✅ (Optional) For clipboard - already built into Flutter, no package needed!

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
